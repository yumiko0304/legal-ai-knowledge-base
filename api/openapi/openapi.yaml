openapi: 3.1.0
info:
  title: 法律 AI 高管知识库 Public API
  version: 0.1.0
  description: Public read-only static API for Legal AI Executive Knowledge Base.
servers:
  - url: /
paths:
  /api/public/items.json:
    get:
      summary: List selected public items
      responses:
        "200":
          description: Selected public items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemsResponse"
  /api/public/latest.json:
    get:
      summary: Get latest issue summary
      responses:
        "200":
          description: Latest issue
          content:
            application/json:
              schema:
                type: object
  /api/public/fingerprint.json:
    get:
      summary: Get lightweight update fingerprint
      responses:
        "200":
          description: Fingerprint
          content:
            application/json:
              schema:
                type: object
  /api/public/version.json:
    get:
      summary: Get API and skill version
      responses:
        "200":
          description: Version information
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    ItemsResponse:
      type: object
      required:
        - version
        - updatedAt
        - items
      properties:
        version:
          type: string
        updatedAt:
          type: string
        mode:
          type: string
        take:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
    Item:
      type: object
      required:
        - id
        - title
        - category
        - publishedAt
        - source
        - url
        - summary
      properties:
        id:
          type: string
        channelId:
          type: string
        title:
          type: string
        category:
          type: string
        publishedAt:
          type: string
        source:
          type: string
        url:
          type: string
        status:
          type: string
        summary:
          type: string
        legalValue:
          type: string
        canonical:
          type: string
